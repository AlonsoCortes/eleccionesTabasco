<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geovisor Electoral — Cárdenas, Tabasco</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>


  <link rel="stylesheet" href="src/css/estilos.css" />
</head>
<body>

  <header id="encabezado">
    <strong>Municipio de Cárdenas, Tabasco</strong>
    <span>Proceso Electoral Local Ordinario 2023-2024</span>
  </header>

  <main>

    <!-- Panel izquierdo: estadísticos generales -->
    <aside id="panel-estadisticos">
      <section id="panel-agregados">
        <h3 class="panel-titulo">Estadísticos generales</h3>
        <div id="metricas-agregadas"></div>
        <div id="grafica-agregada"></div>
        <div id="tabla-partidos"></div>
      </section>
    </aside>

    <!-- Mapa central -->
    <div id="mapa">
      <!-- Botón reset de vista -->
      <button id="btn-reset-vista" title="Volver a vista inicial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 13 15 13 15 21"/>
        </svg>
        Vista inicial
      </button>

      <!-- Leyenda flotante -->
      <div id="leyenda-mapa">
        <p class="leyenda-mapa-titulo">Simbología</p>
        <div id="leyenda"></div>
      </div>

      <!-- Popup de sección (overlay sobre el mapa) -->
      <div id="popup-seccion" class="oculto">
        <div class="popup-sec-header">
          <span>Sección <strong id="popup-sec-id">—</strong></span>
          <button id="popup-cerrar" title="Cerrar">×</button>
        </div>
        <div id="popup-sec-metricas"></div>
        <div id="popup-sec-grafica"></div>
      </div>
    </div>

    <!-- Panel derecho: controles del mapa -->
    <aside id="panel-variables">
      <p class="panel-titulo">Tipo de elección</p>
      <div class="btn-grupo-vertical">
        <button class="btn-capa activo" data-capa="gubernatura">Gubernatura</button>
        <button class="btn-capa" data-capa="diputaciones">Diputaciones</button>
        <button class="btn-capa" data-capa="ayuntamiento">Ayuntamiento</button>
      </div>
      <p class="panel-titulo simbologia-titulo">Variable a mapear</p>
      <div id="lista-variables"></div>
    </aside>

  </main>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
